name: deploy-hook

# blog.md §9-3 — after the gate is green on main, ping the main site's Vercel
# Deploy Hook so samchil.dev/blog rebuilds with the new content (single origin).
on:
  workflow_run:
    workflows: ["quality-gate"]
    types: [completed]
    branches: [main]

jobs:
  trigger:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Call main-site Vercel Deploy Hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL not set — skipping (configure in repo secrets)."
            exit 0
          fi
          curl -fsSL -X POST "$HOOK"
          echo "Deploy hook fired."
